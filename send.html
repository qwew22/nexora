<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Send</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" href="IMAGE.png" type="image/png">
    
    <style>
        :root {
            --primary-silver: #e5e7eb;       
            --secondary-silver: #9ca3af;     
            --dark-metal: #1f2937;           
            --bg-dark: #0b0c10;              
            --glass-bg: rgba(31, 41, 55, 0.4); 
            --glass-border: rgba(148, 163, 184, 0.2); 
            --text-color: #f3f4f6;           
            --text-muted: #9ca3af;
            --accent-green: #4ade80;
            --accent-blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a1d24 0%, #000000 100%);
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
        }

        /* Top Navigation Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo img {
            max-width: 130px;
        }

        .back-btn {
            color: var(--primary-silver);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--accent-blue);
        }

        /* Main Content */
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        .send-card {
            background: linear-gradient(145deg, rgba(31, 41, 55, 0.7), rgba(17, 24, 39, 0.9));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        .send-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .send-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            color: var(--primary-silver);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .send-subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .available-balance {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .available-balance span {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .available-balance strong {
            color: var(--accent-green);
            font-size: 1.3rem;
            font-family: 'Rajdhani', sans-serif;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--primary-silver);
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .send-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
            margin-top: 20px;
        }

        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                max-width: 95%;
            }
        }
        
        @media (max-width: 1024px) {
            .top-bar {
                padding: 15px 30px;
            }
            
            .logo img {
                max-width: 110px;
            }
            
            .send-card {
                padding: 35px 25px;
            }
        }
        
        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }
            
            .send-card {
                padding: 30px 20px;
            }
            
            .send-title {
                font-size: 1.8rem;
            }
            
            .form-group input,
            .form-group textarea {
                font-size: 0.9rem;
            }
            
            .send-btn {
                width: 100%;
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .top-bar {
                padding: 10px 15px;
            }
            
            .logo img {
                max-width: 90px;
            }
            
            .back-btn {
                padding: 8px 15px;
                font-size: 0.85rem;
            }
            
            .container {
                margin: 15px auto;
                padding: 10px;
            }
            
            .send-card {
                padding: 25px 15px;
                border-radius: 20px;
            }
            
            .send-title {
                font-size: 1.5rem;
            }
            
            .send-subtitle {
                font-size: 0.9rem;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            .form-group label {
                font-size: 0.85rem;
            }
            
            .form-group input,
            .form-group textarea {
                padding: 12px;
                font-size: 0.85rem;
            }
            
            .send-btn {
                padding: 14px;
                font-size: 0.95rem;
            }
        }
        
        @media (max-width: 320px) {
            .top-bar {
                padding: 8px 10px;
            }
            
            .logo img {
                max-width: 70px;
            }
            
            .send-title {
                font-size: 1.3rem;
            }
            
            .send-btn {
                padding: 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <div class="top-bar">
        <div class="logo">
            <img src="IMAGE.png" alt="Nexora Logo">
        </div>
        <a href="wallet.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Wallet
        </a>
    </div>

    <div class="container">
        <div class="send-card">
            <h1 class="send-title">Send NRC</h1>
            <p class="send-subtitle">Transfer NRC to another wallet address</p>
            
            <div class="available-balance">
                <span>Available Balance: </span>
                <strong id="availableBalance">0.00 NRC</strong>
            </div>
            
            <form onsubmit="sendNRC(event)">
                <div class="form-group">
                    <label>Recipient Wallet Address</label>
                    <input type="text" id="recipientAddress" placeholder="0x..." required>
                </div>
                
                <div class="form-group">
                    <label>Amount (NRC)</label>
                    <input type="number" id="sendAmount" placeholder="Enter amount" min="0" step="0.01" required>
                </div>
                
                <button type="submit" class="send-btn">
                    <i class="fas fa-paper-plane"></i> Send NRC
                </button>
            </form>
        </div>
    </div>

    <script>
        // Toast notification function
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position: fixed; top: 20px; right: 20px; background: #1f2937; border: 1px solid #4b5563; border-left: 4px solid #4ade80; padding: 15px 25px; border-radius: 4px; color: #f3f4f6; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; font-family: Inter, sans-serif; transform: translateX(200%); transition: transform 0.3s ease-in-out;';
            toast.innerHTML = '<i class="fas fa-check-circle" style="color: #4ade80;"></i><span>' + message + '</span>';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transform = 'translateX(0)';
            }, 100);
            
            setTimeout(() => {
                toast.style.transform = 'translateX(200%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Load balance
        let walletBalance = parseFloat(localStorage.getItem('nexora_balance')) || 0;
        document.getElementById('availableBalance').textContent = walletBalance.toFixed(2) + ' NRC';
        
        function sendNRC(event) {
            event.preventDefault();
            
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const address = document.getElementById('recipientAddress').value;
            
            if (amount > walletBalance) {
                showToast('Insufficient balance! Please check your wallet balance.');
                return;
            }
            
            if (amount <= 0) {
                showToast('Invalid amount! Please enter a valid amount.');
                return;
            }
            
            // Show success notification
            showToast('Successfully sent ' + amount + ' NRC to ' + address.substring(0, 10) + '...');
            
            // Deduct from balance
            walletBalance -= amount;
            localStorage.setItem('nexora_balance', walletBalance.toFixed(2));
            
            // Redirect to wallet
            setTimeout(() => {
                window.location.href = 'wallet.html';
            }, 1500);
        }
        
        // Check if user is logged in
        function checkLogin() {
            const isLoggedIn = localStorage.getItem('nexora_logged_in');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html';
            }
        }
        
        window.onload = checkLogin;
    </script>
</body>
</html>
