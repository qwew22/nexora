<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Support Chat</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" href="IMAGE.png" type="image/png">
    
    <style>
        :root {
            --primary-silver: #e5e7eb;       
            --secondary-silver: #9ca3af;     
            --dark-metal: #1f2937;            
            --bg-dark: #0b0c10;               
            --glass-bg: rgba(31, 41, 55, 0.4); 
            --glass-border: rgba(148, 163, 184, 0.2); 
            --text-color: #f3f4f6;           
            --text-muted: #9ca3af;
            --accent-green: #4ade80;
            --accent-red: #ef4444;
            --accent-purple: #9333ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a1d24 0%, #000000 100%);
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
        }

        /* Top Navigation Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo img {
            max-width: 130px;
        }

        .nav-icons {
            display: flex;
            gap: 10px;
        }

        .nav-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-muted);
            transition: 0.3s;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
        }

        .nav-icon:hover, .nav-icon.active {
            color: var(--primary-silver);
            background: rgba(255,255,255,0.08);
        }

        .nav-icon i {
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .nav-icon span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Main Content */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Chat Container */
        .chat-container {
            background: linear-gradient(145deg, rgba(31, 41, 55, 0.7), rgba(17, 24, 39, 0.9));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #9333ea, #a855f7, #9333ea);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .chat-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            color: var(--primary-silver);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .chat-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .chat-subtitle i {
            color: var(--accent-green);
            margin-right: 5px;
        }

        /* Chat Messages Area */
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.support {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: linear-gradient(145deg, #9333ea, #7c3aed);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.support .message-bubble {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: right;
        }

        .message.support .message-time {
            text-align: left;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            font-size: 0.9rem;
        }

        .message.user .message-avatar {
            background: linear-gradient(145deg, #9333ea, #7c3aed);
            order: 1;
        }

        .message.support .message-avatar {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
        }

        /* Quick Replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .quick-reply {
            padding: 8px 16px;
            background: rgba(147, 51, 234, 0.15);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 20px;
            color: var(--primary-silver);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-reply:hover {
            background: rgba(147, 51, 234, 0.3);
            transform: translateY(-2px);
        }

        /* Chat Input Area */
        .chat-input-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(145deg, #9333ea, #7c3aed);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(147, 51, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(147, 51, 234, 0.5);
        }

        .send-btn:disabled {
            background: linear-gradient(145deg, #6b7280, #4b5563);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1f2937;
            border: 1px solid #4b5563;
            border-left: 4px solid var(--accent-green);
            padding: 15px 25px;
            border-radius: 4px;
            color: var(--text-color);
            transform: translateX(200%);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        .toast.active {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: var(--accent-red);
        }

        .toast.error i {
            color: var(--accent-red);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }
            
            .nav-icons {
                gap: 5px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .nav-icon {
                padding: 8px 12px;
            }
            
            .nav-icon i {
                font-size: 1.2rem;
            }
            
            .nav-icon span {
                font-size: 0.6rem;
            }
            
            .chat-container {
                padding: 20px;
                border-radius: 20px;
            }
            
            .chat-messages {
                height: 300px;
            }
            
            .message-bubble {
                max-width: 85%;
            }
        }

        @media (max-width: 480px) {
            .top-bar {
                padding: 10px 15px;
            }
            
            .logo img {
                max-width: 100px;
            }
            
            .nav-icon {
                padding: 6px 8px;
            }
            
            .nav-icon i {
                font-size: 1rem;
            }
            
            .nav-icon span {
                font-size: 0.5rem;
            }
            
            .chat-title {
                font-size: 1.5rem;
            }
            
            .chat-input-area {
                flex-direction: column;
            }
            
            .chat-input {
                width: 100%;
            }
            
            .send-btn {
                width: 100%;
                border-radius: 12px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <div class="top-bar">
        <div class="logo">
            <img src="IMAGE.png" alt="Nexora Logo">
        </div>
        <div class="nav-icons">
            <a href="home.html" class="nav-icon">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="invite.html" class="nav-icon">
                <i class="fas fa-user-plus"></i>
                <span>Invite</span>
            </a>
            <a href="wallet.html" class="nav-icon">
                <i class="fas fa-wallet"></i>
                <span>Wallet</span>
            </a>
            <a href="chat.html" class="nav-icon active">
                <i class="fas fa-headset"></i>
                <span>Support</span>
            </a>
            <a href="profile.html" class="nav-icon">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <h1 class="chat-title">Support Chat</h1>
                <p class="chat-subtitle"><i class="fas fa-circle"></i> Online - We're here to help</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message support">
                    <div class="message-avatar">
                        <i class="fas fa-headset"></i>
                    </div>
                    <div class="message-bubble">
                        Hello! Welcome to Nexora Support. How can we help you today?
                        <div class="message-time">Just now</div>
                    </div>
                </div>
            </div>

            <div class="quick-replies">
                <div class="quick-reply" onclick="sendQuickReply('I need help with my wallet')">Wallet Issues</div>
                <div class="quick-reply" onclick="sendQuickReply('I want to report a problem')">Report Problem</div>
                <div class="quick-reply" onclick="sendQuickReply('How do I complete KYC?')">KYC Help</div>
                <div class="quick-reply" onclick="sendQuickReply('I have a billing question')">Billing</div>
            </div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Notification</span>
    </div>

    <script>
        // Toast notification function
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgSpan = document.getElementById('toast-message');
            const icon = toast.querySelector('i');
            
            msgSpan.innerText = message;
            
            if (isError) {
                toast.classList.add('error');
                icon.className = 'fas fa-times-circle';
            } else {
                toast.classList.remove('error');
                icon.className = 'fas fa-check-circle';
            }
            
            toast.classList.add('active');

            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        // Get current time
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Send message function
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message === '') {
                showToast('Please type a message', true);
                return;
            }

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Simulate support response after a delay
            setTimeout(() => {
                const responses = [
                    "Thank you for reaching out! Our team is reviewing your message. We'll get back to you shortly.",
                    "We understand your concern. Let me check on that for you.",
                    "That's a great question! Here's what I can tell you...",
                    "I appreciate your patience. Our support team is working on resolving your issue.",
                    "Thanks for contacting us! Is there anything else you'd like to know?"
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage(randomResponse, 'support');
            }, 1500);
        }

        // Add message to chat
        function addMessage(text, sender) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;
            
            const avatarIcon = sender === 'user' ? 'fa-user' : 'fa-headset';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="fas ${avatarIcon}"></i>
                </div>
                <div class="message-bubble">
                    ${text}
                    <div class="message-time">${getCurrentTime()}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Quick reply function
        function sendQuickReply(text) {
            addMessage(text, 'user');
            
            // Simulate support response
            setTimeout(() => {
                const responses = {
                    'I need help with my wallet': "For wallet issues, please make sure your PIN is correct. If you're still having trouble, you can reset your PIN from the profile section.",
                    'I want to report a problem': "We're sorry to hear that. Please describe the issue in detail, and our team will investigate it promptly.",
                    'How do I complete KYC?': "To complete KYC, go to your Profile section and click on 'KYC Verification'. You'll need to upload a valid ID document.",
                    'I have a billing question': "For billing inquiries, please provide your transaction ID or wallet address, and we'll look into it right away."
                };
                
                const response = responses[text] || "Thank you for your message. Our team will get back to you shortly.";
                addMessage(response, 'support');
            }, 1500);
        }

        // Handle Enter key press
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Check if user is logged in
        function checkLogin() {
            const isLoggedIn = localStorage.getItem('nexora_logged_in');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html';
            }
        }

        window.onload = function() {
            checkLogin();
        };
    </script>
</body>
</html>
