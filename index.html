<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Crypto Mining</title>
    <!-- Favicon -->
    <link rel="icon" href="IMAGE.png" type="image/png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Silver/Grey Crypto Palette */
            --primary-silver: #e5e7eb;       
            --secondary-silver: #9ca3af;     
            --dark-metal: #1f2937;           
            --bg-dark: #0b0c10;              
            --glass-bg: rgba(31, 41, 55, 0.4); 
            --glass-border: rgba(148, 163, 184, 0.2); 
            --text-color: #f3f4f6;           
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a1d24 0%, #000000 100%);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Canvas */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            min-height: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
            display: flex;
            overflow: hidden;
            margin: 20px;
        }

        /* Left Side - Branding */
        .brand-section {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(160deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 100%);
            border-right: 1px solid var(--glass-border);
            text-align: left;
            position: relative;
        }

        .brand-section::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 4px;
            background: var(--primary-silver);
            border-radius: 2px;
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            max-width: 350px;
            height: auto;
            display: block;
        }

        .tagline {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--secondary-silver);
            font-weight: 300;
            border-left: 2px solid var(--secondary-silver);
            padding-left: 20px;
        }

        .highlight {
            display: block;
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 15px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* Right Side - Only Social Options */
        .form-section {
            flex: 1;
            padding: 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            text-align: center; /* Center header text */
        }

        .form-header h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--primary-silver);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        /* Social Buttons Container */
        .social-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            margin-top: 20px;
        }

        /* Button Style - Silver/Grey Only */
        .btn-social-large {
            /* Centering width slightly less than 100% to look elegant */
            width: 85%; 
            padding: 22px 25px;
            /* Silver/Grey Gradient Background */
            background: linear-gradient(145deg, #d1d5db, #9ca3af);
            border: 1px solid #f3f4f6;
            border-radius: 12px;
            /* Dark Text for contrast on silver */
            color: #1f2937; 
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; 
            
            /* Metallic Shadow */
            box-shadow: 0 6px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .btn-social-large i {
            font-size: 1.4rem; 
            color: #111827; /* Dark Icon to match text */
        }

        /* Hover Effect - Lighter Silver/Grey */
        .btn-social-large:hover {
            background: linear-gradient(145deg, #e5e7eb, #d1d5db);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
            color: #000;
        }
        .btn-social-large:hover i {
            color: #000;
        }

        /* Email/Password Form */
        .email-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-silver);
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-silver);
            box-shadow: 0 0 0 2px rgba(229, 231, 235, 0.1);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        /* PIN Input - Center text and make it look like mobile security */
        .input-group input[type="password"] {
            text-align: center;
            letter-spacing: 8px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn-login {
            width: 85%;
            padding: 14px;
            background: linear-gradient(145deg, #d1d5db, #9ca3af);
            border: 1px solid #f3f4f6;
            border-radius: 8px;
            color: #1f2937;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6);
            margin: 0 auto;
            display: block;
        }

        .btn-login:hover {
            background: linear-gradient(145deg, #e5e7eb, #d1d5db);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.8);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .divider span {
            padding: 0 15px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Footer */
        .form-footer {
            margin-top: auto;
            padding-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .form-footer a {
            color: var(--secondary-silver);
            text-decoration: none;
            margin: 0 5px;
            transition: 0.3s;
        }

        .form-footer a:hover {
            color: var(--primary-silver);
            text-decoration: underline;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1f2937;
            border: 1px solid #4b5563;
            border-left: 4px solid var(--primary-silver);
            padding: 15px 25px;
            border-radius: 4px;
            color: var(--primary-silver);
            transform: translateX(200%);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        .toast.active {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                max-width: 95%;
                margin: 15px;
            }
        }
        
        @media (max-width: 1024px) {
            .brand-section {
                padding: 40px;
            }
            
            .form-section {
                padding: 40px;
            }
            
            .logo img {
                max-width: 300px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 650px;
            }
            .brand-section {
                padding: 30px;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
                text-align: center;
                align-items: center;
            }
            .brand-section::before { left: 50%; transform: translateX(-50%); }
            .tagline { border-left: none; padding-left: 0; }
            .logo img { max-width: 250px; }
            .btn-social-large { width: 90%; }
            
            .form-section {
                padding: 30px 20px;
            }
            
            .form-header h2 {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                margin: 10px;
                border-radius: 12px;
            }
            
            .brand-section {
                padding: 25px 15px;
            }
            
            .logo img {
                max-width: 200px;
            }
            
            .tagline {
                font-size: 0.9rem;
            }
            
            .highlight {
                font-size: 1.2rem;
            }
            
            .form-section {
                padding: 25px 15px;
            }
            
            .form-header h2 {
                font-size: 1.5rem;
            }
            
            .form-header p {
                font-size: 0.85rem;
            }
            
            .btn-social-large {
                width: 100%;
                padding: 18px 20px;
                font-size: 0.9rem;
            }
            
            .btn-login {
                width: 100%;
                font-size: 0.9rem;
            }
            
            .input-group input {
                padding: 12px 12px 12px 40px;
                font-size: 0.9rem;
            }
            
            .form-footer {
                font-size: 0.7rem;
            }
        }
        
        @media (max-width: 320px) {
            .container {
                margin: 5px;
                min-height: 550px;
            }
            
            .logo img {
                max-width: 150px;
            }
            
            .highlight {
                font-size: 1rem;
            }
            
            .btn-social-large {
                padding: 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- Branding Side -->
        <div class="brand-section">
            <div class="logo">
                <img src="IMAGE.png" alt="Nexora Logo">
            </div>
            <div class="tagline">
                Welcome to the Future of Mining.
                <span class="highlight">Mine Smarter.<br>Grow Faster. Choose Nexora</span>
            </div>
        </div>

        <!-- Forms Side -->
        <div class="form-section">
            <div class="form-header">
                <h2>Join Nexora</h2>
                <p>Signup your account to start mining.</p>
            </div>
            
            <!-- Social Login Options (Centered) -->
            <div class="social-container">
                
                <!-- Social Login Options (Show when NOT logged in) -->
                <div id="socialOptions">
                    <!-- 1st Option: Facebook -->
                    <button class="btn-social-large" onclick="socialLogin('Facebook')">
                        <i class="fab fa-facebook-f"></i>
                        <span>Sign in with Facebook</span>
                    </button>

                    <!-- 2nd Option: Google -->
                    <button class="btn-social-large" onclick="socialLogin('Google')">
                        <i class="fab fa-google"></i>
                        <span>Sign in with Google</span>
                    </button>
                </div>

                <!-- PIN Login Form (Show when logged in) -->
                <div id="pinLogin" style="display: none;">
                    <div class="divider"><span>Welcome Back</span></div>
                    <div class="form-footer" style="margin-top: 20px;">
                        <a href="profile.html"><i class="fas fa-user"></i> View Profile</a>
                    </div>
                </div>

            </div>

            <div class="form-footer">
                By joining, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Notification</span>
    </div>

    <script>
        // --- 1. Interaction Handling ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            const msgSpan = document.getElementById('toast-message');
            
            msgSpan.innerText = message;
            toast.classList.add('active');

            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        function socialLogin(platform) {
            // Show toast notification
            showToast(`Connecting to ${platform}...`);
            
            // Save login status
            localStorage.setItem('nexora_logged_in', 'true');
            
            // Redirect to home.html after short delay
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }

        // Handle PIN Login
        function handleLogin(event) {
            event.preventDefault();
            
            const pin = document.getElementById('pin').value;
            
            if(pin && pin.length === 4) {
                showToast('Verifying PIN...');
                
                // Save login status
                localStorage.setItem('nexora_logged_in', 'true');
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
            } else {
                showToast('Please enter a 4-digit PIN');
            }
            
            return false;
        }

        // Check login status and show appropriate options
        function checkLoginStatus() {
            const isLoggedIn = localStorage.getItem('nexora_logged_in');
            const socialOptions = document.getElementById('socialOptions');
            const pinLogin = document.getElementById('pinLogin');
            const formHeader = document.querySelector('.form-header');
            
            if (isLoggedIn === 'true') {
                // User is logged in - show PIN login
                socialOptions.style.display = 'none';
                pinLogin.style.display = 'block';
                formHeader.querySelector('h2').innerText = 'Welcome Back';
                formHeader.querySelector('p').innerText = 'Enter your PIN to continue.';
            } else {
                // User is not logged in - show social options
                socialOptions.style.display = 'block';
                pinLogin.style.display = 'none';
                formHeader.querySelector('h2').innerText = 'Join Nexora';
                formHeader.querySelector('p').innerText = 'Create your account to start mining.';
            }
        }

        // Logout function
        function logout() {
            localStorage.removeItem('nexora_logged_in');
            showToast('Logged out successfully');
            setTimeout(() => {
                checkLoginStatus();
            }, 1000);
        }

        // Initialize on page load
        window.onload = checkLoginStatus;

        // --- 2. Silver/Grey Particle Animation ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5; 
                this.speedX = Math.random() * 0.5 - 0.25; 
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = Math.random() > 0.8 ? '#e5e7eb' : '#6b7280'; 
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            const numberOfParticles = (canvas.height * canvas.width) / 10000; 
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                
                // Connections
                for (let j = i; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(107, 114, 128, ${0.15 - distance/120})`; 
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
    </script>
</body>
</html>
