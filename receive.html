<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Receive</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" href="IMAGE.png" type="image/png">
    
    <style>
        :root {
            --primary-silver: #e5e7eb;       
            --secondary-silver: #9ca3af;     
            --dark-metal: #1f2937;           
            --bg-dark: #0b0c10;              
            --glass-bg: rgba(31, 41, 55, 0.4); 
            --glass-border: rgba(148, 163, 184, 0.2); 
            --text-color: #f3f4f6;           
            --text-muted: #9ca3af;
            --accent-green: #4ade80;
            --accent-purple: #9333ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a1d24 0%, #000000 100%);
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
        }

        /* Top Navigation Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo img {
            max-width: 130px;
        }

        .back-btn {
            color: var(--primary-silver);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--accent-purple);
        }

        /* Main Content */
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        .receive-card {
            background: linear-gradient(145deg, rgba(31, 41, 55, 0.7), rgba(17, 24, 39, 0.9));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        .receive-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #9333ea, #a855f7, #9333ea);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .receive-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            color: var(--primary-silver);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .receive-subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .qr-code {
            background: white;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .qr-code i {
            font-size: 8rem;
            color: var(--dark-metal);
        }

        .wallet-address-box {
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .wallet-address-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .wallet-address {
            color: var(--primary-silver);
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .copy-btn {
            padding: 12px 30px;
            background: linear-gradient(145deg, #9333ea, #7c3aed);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4);
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(147, 51, 234, 0.5);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                max-width: 95%;
            }
        }
        
        @media (max-width: 1024px) {
            .top-bar {
                padding: 15px 30px;
            }
            
            .logo img {
                max-width: 110px;
            }
            
            .receive-card {
                padding: 35px 25px;
            }
        }
        
        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }
            
            .receive-card {
                padding: 30px 20px;
            }
            
            .receive-title {
                font-size: 1.8rem;
            }
            
            .qr-code i {
                font-size: 5rem;
            }
            
            .wallet-address {
                flex-direction: column;
                gap: 10px;
            }
            
            .address-input {
                text-align: center;
            }
            
            .copy-btn {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .top-bar {
                padding: 10px 15px;
            }
            
            .logo img {
                max-width: 90px;
            }
            
            .back-btn {
                padding: 8px 15px;
                font-size: 0.85rem;
            }
            
            .container {
                margin: 15px auto;
                padding: 10px;
            }
            
            .receive-card {
                padding: 25px 15px;
                border-radius: 20px;
            }
            
            .receive-title {
                font-size: 1.5rem;
            }
            
            .receive-subtitle {
                font-size: 0.9rem;
            }
            
            .qr-code {
                padding: 20px;
            }
            
            .qr-code i {
                font-size: 4rem;
            }
            
            .address-input {
                padding: 12px;
                font-size: 0.85rem;
            }
            
            .copy-btn {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 320px) {
            .top-bar {
                padding: 8px 10px;
            }
            
            .logo img {
                max-width: 70px;
            }
            
            .receive-title {
                font-size: 1.3rem;
            }
            
            .qr-code i {
                font-size: 3rem;
            }
            
            .copy-btn {
                padding: 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <div class="top-bar">
        <div class="logo">
            <img src="IMAGE.png" alt="Nexora Logo">
        </div>
        <a href="wallet.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Wallet
        </a>
    </div>

    <div class="container">
        <div class="receive-card">
            <h1 class="receive-title">Receive NRC</h1>
            <p class="receive-subtitle">Share your wallet address to receive NRC</p>
            
            <div class="qr-code">
                <i class="fas fa-qrcode"></i>
            </div>
            
            <div class="wallet-address-box">
                <div class="wallet-address-label">Your Wallet Address</div>
                <div class="wallet-address" id="walletAddress">0x8f7a9b3c2d1e4f5a6b7c8d9e0f1a2b3c4d5e6f7</div>
                <button class="copy-btn" onclick="copyAddress()">
                    <i class="fas fa-copy"></i> Copy Address
                </button>
            </div>
        </div>
    </div>

    <script>
        // Toast notification function
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position: fixed; top: 20px; right: 20px; background: #1f2937; border: 1px solid #4b5563; border-left: 4px solid #4ade80; padding: 15px 25px; border-radius: 4px; color: #f3f4f6; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; font-family: Inter, sans-serif; transform: translateX(200%); transition: transform 0.3s ease-in-out;';
            toast.innerHTML = '<i class="fas fa-check-circle" style="color: #4ade80;"></i><span>' + message + '</span>';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transform = 'translateX(0)';
            }, 100);
            
            setTimeout(() => {
                toast.style.transform = 'translateX(200%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function copyAddress() {
            const address = document.getElementById('walletAddress').textContent;
            navigator.clipboard.writeText(address).then(() => {
                showToast('Wallet address copied to clipboard!');
            });
        }
        
        // Check if user is logged in
        function checkLogin() {
            const isLoggedIn = localStorage.getItem('nexora_logged_in');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html';
            }
        }
        
        window.onload = checkLogin;
    </script>
</body>
</html>
